<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #020617);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        #bouncing-logo { 
            position: absolute; 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            object-fit: cover;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transition: transform 0.2s;
            z-index: 20;
        }
        
        #bouncing-logo:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <audio id="clickSound" src="https://www.myinstants.com/media/sounds/click.mp3"></audio>

    <img id="bouncing-logo" src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=WJ3faivzsp4Q7kNvwFwCGJg&_nc_oc=Adryh1560rK2Dga1sRCAZY21BjDad7XBkgC6Rvx39Ohl_xzdvyQzcAsob5jaA_AlWV4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=R7QLdS4BkPxOiehch8jdvg&_nc_ss=7c2a8&oh=00_Af_C-FTW1jFtXcZ2bxlhnhO8jHTf0SL9JJvxg8n6KG6flA&oe=6A2A1281" 
         alt="Logo">

    <div class="text-center p-12 glass rounded-3xl max-w-lg mx-4 z-10 shadow-2xl">
        <h1 class="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 mb-4 animate-pulse">404</h1>
        <p class="text-xl text-gray-300 mb-8 font-light italic">The digital ether has shifted. Catch the core to reset.</p>
        
        <a href="portal.html" id="portalBtn" 
           class="px-10 py-4 bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold rounded-full transition-all backdrop-blur-md hover:shadow-[0_0_30px_rgba(255,255,255,0.3)]">
            Return to Portal
        </a>
    </div>

    <script>
        const logo = document.getElementById('bouncing-logo');
        const clickSound = document.getElementById('clickSound');
        
        let posX = 50, posY = 50;
        let velX = 4, velY = 4;
        
        function moveLogo() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // Check wall collision
            if (posX + 80 >= width || posX <= 0) velX *= -1;
            if (posY + 80 >= height || posY <= 0) velY *= -1;
            
            posX += velX;
            posY += velY;
            
            logo.style.left = posX + 'px';
            logo.style.top = posY + 'px';
            requestAnimationFrame(moveLogo);
        }
        
        // Interaction listeners
        document.addEventListener('click', (e) => {
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {});
            
            // Add a visual ripple effect on click
            const ripple = document.createElement('div');
            ripple.className = 'absolute bg-white/20 rounded-full animate-ping';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            ripple.style.left = (e.clientX - 50) + 'px';
            ripple.style.top = (e.clientY - 50) + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        });

        // Start movement
        moveLogo();
    </script>
</body>
</html>
