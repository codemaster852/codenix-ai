name: Deploy CodeNix AI Securely

on:
  push:
    branches:
      - main  # Trigger build whenever changes push to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Securely Inject Nix_API Secret Key
        run: |
          # Replace the source code placeholder string with your secure GitHub Action Secret
          sed -i 's|NIX_API_KEY_PLACEHOLDER|${{ secrets.NIX_API }}|g' index.html

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Secure Site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
