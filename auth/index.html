<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

        :root {
            --primary-purple: #8a2be2;
            --dark-bg: #030014;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border-color: rgba(138, 43, 226, 0.2);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(138, 43, 226, 0.05) 0%, transparent 40%);
        }

        @media (min-width: 1024px) { * { cursor: none !important; } }
        
        #custom-cursor {
            position: fixed; width: 0; height: 0;
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-bottom: 20px solid var(--primary-purple);
            transform: rotate(-30deg); pointer-events: none; z-index: 10000;
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }
        @media (min-width: 1024px) { #custom-cursor { display: block; } }

        .glass { background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid var(--border-color); }

        .input-group input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none; border-color: var(--primary-purple);
            background: rgba(138, 43, 226, 0.05);
        }

        .btn-gradient { background: linear-gradient(135deg, #8a2be2 0%, #4f46e5 100%); transition: all 0.3s ease; }
        .btn-gradient:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3); }

        .loader {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 0.8s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-5 right-5 z-50 p-4 rounded-xl glass text-sm hidden border border-purple-500/50 shadow-2xl"></div>

    <div class="auth-card glass w-full max-w-[450px] p-8 rounded-3xl animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center bg-gradient-to-br from-purple-600 to-indigo-900 border border-purple-400/30 mb-4">
                <i class="fas fa-terminal text-white"></i>
            </div>
            <h1 id="auth-title" class="text-2xl font-bold tracking-tight">Welcome Back</h1>
            <p id="auth-subtitle" class="text-gray-400 text-sm mt-1">Access the Codenix Neural Network</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button type="button" onclick="signInWithOAuth('google')" class="py-2.5 rounded-xl border border-white/10 hover:bg-white/5 transition text-sm font-medium">
                <i class="fab fa-google text-red-500 mr-2"></i> Google
            </button>
            <button type="button" onclick="signInWithOAuth('github')" class="py-2.5 rounded-xl border border-white/10 hover:bg-white/5 transition text-sm font-medium">
                <i class="fab fa-github mr-2"></i> GitHub
            </button>
        </div>

        <div class="flex items-center gap-4 mb-6">
            <div class="h-[1px] bg-white/10 flex-grow"></div>
            <span class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Or with Email</span>
            <div class="h-[1px] bg-white/10 flex-grow"></div>
        </div>

        <form id="auth-form" class="space-y-4">
            <div class="input-group">
                <input type="email" id="email" required placeholder="name@domain.com" class="w-full px-5 py-3 rounded-xl text-white text-sm">
            </div>

            <div id="signup-fields" class="space-y-4 hidden">
                <div class="input-group">
                    <input type="text" id="fullname" placeholder="Full Name" class="w-full px-5 py-3 rounded-xl text-white text-sm">
                </div>
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" class="w-full px-5 py-3 rounded-xl text-white text-sm">
                </div>
            </div>

            <!-- Policy Checkbox -->
            <div id="privacy-container" class="hidden items-start gap-3 py-2">
                <input type="checkbox" id="privacy-check" class="mt-1 w-4 h-4 rounded border-gray-600 bg-white/5 accent-purple-500 cursor-pointer">
                <label for="privacy-check" class="text-xs text-gray-400">
                    I agree to the <a href="policy.html" target="_blank" class="text-purple-400 hover:underline">Privacy Policy</a> and understand the terms of use.
                </label>
            </div>

            <button type="submit" id="submit-btn" class="w-full btn-gradient py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                <span id="btn-text">Initiate Session</span>
                <div class="loader" id="btn-loader"></div>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <p class="text-gray-500 text-sm">
                <span id="toggle-text">Don't have an account?</span>
                <button onclick="toggleMode()" id="toggle-link" class="text-purple-400 font-bold ml-1 hover:underline">Create Access</button>
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isSignUpMode = false;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden', 'border-purple-500/50', 'border-red-500/50');
            toast.classList.add(isError ? 'border-red-500/50' : 'border-purple-500/50');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        function setMode(signUp) {
            isSignUpMode = signUp;
            document.getElementById('signup-fields').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('privacy-container').classList.toggle('hidden', !isSignUpMode);
            
            document.getElementById('auth-title').innerText = isSignUpMode ? "Join Codenix" : "Welcome Back";
            document.getElementById('btn-text').innerText = isSignUpMode ? "Register Account" : "Initiate Session";
            document.getElementById('toggle-text').innerText = isSignUpMode ? "Already a member?" : "Don't have an account?";
            document.getElementById('toggle-link').innerText = isSignUpMode ? "Sign In" : "Create Access";
        }

        function toggleMode() { setMode(!isSignUpMode); }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isSignUpMode && !document.getElementById('privacy-check').checked) {
                showToast("Please agree to the privacy policy to continue.", true);
                return;
            }

            const loader = document.getElementById('btn-loader');
            loader.style.display = 'block';

            try {
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email: document.getElementById('email').value,
                    options: { emailRedirectTo: window.location.origin + '/portal' }
                });
                if (error) throw error;
                showToast("Check your email for the magic link!");
            } catch (err) {
                showToast(err.message, true);
            } finally {
                loader.style.display = 'none';
            }
        });

        // Mouse Cursor
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
